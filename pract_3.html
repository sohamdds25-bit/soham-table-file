<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Ordered and Unordered List</title>
<img src = "fruits2.0.jpg" alt= "fruits" width="600" height="200">
</head>
<body>

  <h2>Unordered List (Bullets)</h2>
  <ul>
    <li>Apple</li>
    <li>Banana</li>
    <li>Orange</li>
  </ul>

  <h2>Ordered List (Numbers)</h2>
  <ol>
    <li>First item</li>
    <li>Second item</li>
    <li>Third item</li>
  </ol>


</body>
</html>
